services:
  # Postgres local para desarrollo. En producción usamos Supabase.
  # Opcional: permite trabajar sin depender del pooler de Supabase.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cehta
      POSTGRES_PASSWORD: cehta_dev
      POSTGRES_DB: cehta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/db/views.sql:/docker-entrypoint-initdb.d/02_views.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cehta -d cehta"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
