name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/openapi.json"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/openapi.json"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-anon
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Verify types/api.ts is in sync with backend/openapi.json
        run: |
          if [ -f ../backend/openapi.json ]; then
            npm run gen:types
            if ! git diff --exit-code types/api.ts; then
              echo "::error::types/api.ts está desactualizado. Corre 'npm run gen:types' y commitea."
              exit 1
            fi
          else
            echo "::notice::backend/openapi.json aún no existe — skip de Disciplina 5 hasta Fase 2.1."
          fi

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  check-disciplinas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Disciplina 1 — no constantes de negocio en frontend
        run: |
          set +e
          FAIL=0
          for pattern in '0\.19' "'0,19'" "EMPRESAS\s*=\s*\[" "^\s*const\s+(IVA|TAX|MAX_MONTO)"; do
            if grep -rnE "$pattern" frontend/app frontend/components frontend/lib 2>/dev/null; then
              echo "::error::Disciplina 1 violada: patrón '$pattern' encontrado"
              FAIL=1
            fi
          done
          exit $FAIL
      - name: Disciplina 3 — no authorization logic en frontend
        run: |
          set +e
          if grep -rn "user\.role ===" frontend/app frontend/components frontend/lib 2>/dev/null; then
            echo "::error::Disciplina 3 violada: usar allowed_actions"
            exit 1
          fi
      - name: Disciplina 4 — no validaciones de dominio en frontend
        run: |
          set +e
          if grep -rnE "validateRutMod11|validarRutMod11|calcularIVA" frontend/app frontend/components frontend/lib 2>/dev/null; then
            echo "::error::Disciplina 4 violada: validación de dominio pertenece al backend"
            exit 1
          fi
