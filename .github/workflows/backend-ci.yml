name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: mypy
        run: mypy app

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cehta
          POSTGRES_PASSWORD: cehta_ci
          POSTGRES_DB: cehta
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cehta"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://cehta:cehta_ci@localhost:5432/cehta
      ALEMBIC_DATABASE_URL: postgresql://cehta:cehta_ci@localhost:5432/cehta
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: test-anon
      SUPABASE_SERVICE_ROLE_KEY: test-service
      SUPABASE_JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=70

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: bandit
        run: bandit -q -r app
      - name: pip-audit
        run: pip-audit --ignore-vuln GHSA-h4gh-qq45-vh27 || true
