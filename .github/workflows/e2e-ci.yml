name: e2e-ci

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  playwright:
    runs-on: ubuntu-latest
    # Skip when running on forks where secrets aren't available — Playwright
    # tests would otherwise fail trying to log into Supabase.
    if: github.event.pull_request.head.repo.fork == false
    timeout-minutes: 20
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Skip if E2E secrets not configured
        id: gate
        run: |
          if [ -z "${E2E_BASE_URL}" ] || [ -z "${E2E_EMAIL}" ] || [ -z "${E2E_PASSWORD}" ]; then
            echo "::notice::E2E secrets not configured — skipping Playwright run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        if: steps.gate.outputs.skip != 'true'
        run: npm run e2e

      - name: Upload Playwright report
        if: steps.gate.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
